name: Deploy to VPS

on:
  push:
    branches: ['main']

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy on server
        shell: bash
        run: |
          set -euo pipefail
          cd /home/fando/ARSIPKPU
          git fetch origin
          git reset --hard origin/main
          docker compose up -d --build
